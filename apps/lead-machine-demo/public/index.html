<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Machine Seller Desk</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="topbar app-header">
    <div class="brand-lockup">
      <span class="app-mark">LM</span>
      <div>
        <p class="eyebrow">Lead intelligence desk</p>
        <h1>Lead Machine</h1>
      </div>
    </div>
    <div class="boundary compact-boundary">
      <strong>Find leads · call · log outcome · follow up</strong>
    </div>
  </header>

  <main class="app-shell">
    <section class="search-panel structured-search">
      <select id="professionSelect" hidden></select>
      <input id="locationInput" type="hidden" value="">
      <datalist id="locationOptions"></datalist>
      <label class="query-label">
        <span>Søk</span>
        <input id="queryInput" value="" list="searchSuggestions" placeholder="Søk fritt: escape room, paintball, advokat i Oslo" autocomplete="off">
        <datalist id="searchSuggestions">
          <option value="escape room"></option>
          <option value="paintball"></option>
          <option value="advokat i Oslo"></option>
          <option value="rørlegger i Kristiansand"></option>
          <option value="fysioterapeut i Ålesund"></option>
          <option value="restaurant Bergen"></option>
        </datalist>
      </label>
      <input id="provider" type="hidden" value="balanced">
      <label><span>Hva selger du?</span><select id="sellerIntent"><option value="general_b2b" selected>Generell B2B</option><option value="web_it">Nettsider / IT</option><option value="ads_marketing">Annonser / marketing</option><option value="telecom">Telefoni</option><option value="accounting">Regnskap</option><option value="insurance">Forsikring</option><option value="finance">Finans / factoring</option><option value="recruiting">Rekruttering</option><option value="other">Annet</option></select></label>
      <input id="runMode" type="hidden" value="fast">
      <input id="maxResults" type="hidden" value="25">
      <label><span>Område</span><select id="searchScope"><option value="regional" selected>Hele Norge</option><option value="strict">Kun sted i søket</option><option value="nearby">Nærområde</option></select></label>
      <input id="companyProfile" type="hidden" value="true">
      <button id="runButton" type="button">Kjør søk</button>
      <div class="search-help">
        <p class="search-hint">Søk fritt i hele Norge. Skriv sted i søket når du vil snevre inn.</p>
        <div class="search-examples" aria-label="Eksempelsøk">
          <button type="button" data-query-example="escape room">escape room</button>
          <button type="button" data-query-example="paintball">paintball</button>
          <button type="button" data-query-example="advokat i Oslo">advokat i Oslo</button>
          <button type="button" data-query-example="rørlegger i Kristiansand">rørlegger i Kristiansand</button>
        </div>
      </div>
    </section>

    <section id="statusPanel" class="status-panel" hidden></section>
    <section id="summaryPanel" class="summary-panel"></section>
    <section id="readinessPanel" class="readiness-panel"></section>

    <section class="desk-grid">
      <aside class="lead-list">
        <div class="panel-title">Current call</div>
        <div id="workflowBoard" class="workflow-board empty">Run a search to build the next call.</div>
        <details class="lead-controls advanced-lead-controls">
          <summary>Filter / sort lead list</summary>
          <div class="lead-controls-body">
            <div class="queue-presets" aria-label="Queue presets">
              <button type="button" class="queue-preset" data-queue-preset="callNow">Call now</button>
              <button type="button" class="queue-preset" data-queue-preset="verify">Needs verification</button>
              <button type="button" class="queue-preset" data-queue-preset="followUp">Follow-ups</button>
              <button type="button" class="queue-preset" data-queue-preset="interested">Interested</button>
            </div>
            <label><span>Sort</span><select id="leadSort">
              <option value="callQueue" selected>Call queue first</option>
              <option value="sellerFit">Seller fit first</option>
              <option value="best">Best first</option>
              <option value="phone">Phone first</option>
              <option value="confirmed">Confirmed org.nr</option>
              <option value="reviews">Google reviews</option>
              <option value="employees">Employees</option>
              <option value="discovery">Discovery confidence</option>
              <option value="followUp">Follow-up due</option>
            </select></label>
            <div class="filter-chips" aria-label="Lead filters">
              <label><input type="checkbox" class="lead-filter" value="phone"> Phone</label>
              <label><input type="checkbox" class="lead-filter" value="confirmed"> Confirmed org.nr</label>
              <label><input type="checkbox" class="lead-filter" value="candidate"> Candidate org.nr</label>
              <label><input type="checkbox" class="lead-filter" value="website"> Website</label>
              <label><input type="checkbox" class="lead-filter" value="exact"> Exact location</label>
              <label><input type="checkbox" class="lead-filter" value="needsDeep"> Needs enrichment</label>
              <label><input type="checkbox" class="lead-filter" value="brregIssue"> Brreg issue</label>
              <label><input type="checkbox" class="lead-filter" value="notContacted"> Not contacted</label>
              <label><input type="checkbox" class="lead-filter" value="contacted"> Contacted</label>
              <label><input type="checkbox" class="lead-filter" value="followUpDue"> Follow-up due</label>
              <label><input type="checkbox" class="lead-filter" value="interested"> Interested</label>
            </div>
            <button type="button" id="clearLeadFilters">Clear filters</button>
            <p id="leadFilterSummary" class="filter-summary">No filters applied.</p>
          </div>
        </details>
        <div id="leadCards"></div>
      </aside>
      <section class="lead-detail">
        <div id="leadDetail" class="empty-state">Run a search to see ranked lead packs.</div>
      </section>
    </section>

    <section id="exportPanel" class="export-panel"></section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
