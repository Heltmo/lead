<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Machine Seller Desk</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar app-header">
    <div class="brand-lockup">
      <span class="app-mark">LM</span>
      <div>
        <p class="eyebrow">Selgerdesk for nettsidesalg</p>
        <h1>Lead Machine</h1>
      </div>
    </div>
    <div id="mobileActiveBar" class="mobile-active-bar" hidden></div>
  </header>

  <main class="app-shell">
    <section class="search-panel structured-search">
      <label class="query-label">
        <span>Søk</span>
        <input id="queryInput" value="" list="searchSuggestions" placeholder="Søk fritt: escape room, paintball, advokat i Oslo" autocomplete="off">
        <datalist id="searchSuggestions">
          <option value="escape room"></option>
          <option value="paintball"></option>
          <option value="advokat i Oslo"></option>
          <option value="rørlegger i Kristiansand"></option>
          <option value="fysioterapeut i Ålesund"></option>
          <option value="restaurant Bergen"></option>
        </datalist>
      </label>
      <input id="provider" type="hidden" value="balanced">
      <input id="runMode" type="hidden" value="fast">
      <input id="maxResults" type="hidden" value="25">
      <input id="searchScope" type="hidden" value="regional">
      <input id="companyProfile" type="hidden" value="true">
      <button id="runButton" type="button">Kjør søk</button>
    </section>

    <section id="statusPanel" class="status-panel" hidden></section>
    <section id="commandCenterPanel" class="command-center-panel"></section>

    <section class="desk-grid">
      <aside class="daily-sidebar">
        <div id="dailyCheckin" class="daily-checkin-panel"></div>
      </aside>
      <aside class="lead-list">
        <div class="panel-title">Arbeidskøer</div>
        <nav id="workQueueTabs" class="work-queue-tabs" aria-label="Seller work queues"></nav>
        <div id="workflowBoard" class="workflow-board empty">Kjør et søk for å bygge neste samtale.</div>
        <details class="lead-controls advanced-lead-controls">
          <summary>Filtrer / sorter leads</summary>
          <div class="lead-controls-body">
            <div id="cityChips" class="city-chip-row" aria-label="Byfilter"></div>
            <div class="queue-presets" aria-label="Queue presets">
              <button type="button" class="queue-preset" data-queue-preset="callNow">Ring nå</button>
              <button type="button" class="queue-preset" data-queue-preset="verify">Må verifiseres</button>
              <button type="button" class="queue-preset" data-queue-preset="followUp">Oppfølging</button>
              <button type="button" class="queue-preset" data-queue-preset="interested">Interessert</button>
            </div>
            <label><span>Sorter</span><select id="leadSort">
              <option value="callQueue" selected>Kø først</option>
              <option value="city">By / marked først</option>
              <option value="sellerFit">Beste selgermatch</option>
              <option value="best">Beste først</option>
              <option value="phone">Telefon først</option>
              <option value="confirmed">Bekreftet org.nr</option>
              <option value="reviews">Google-omtaler</option>
              <option value="employees">Ansatte</option>
              <option value="discovery">Treffsikkerhet</option>
              <option value="followUp">Oppfølging først</option>
            </select></label>
            <div class="filter-chips" aria-label="Lead filters">
              <label><input type="checkbox" class="lead-filter" value="phone"> Telefon</label>
              <label><input type="checkbox" class="lead-filter" value="confirmed"> Bekreftet org.nr</label>
              <label><input type="checkbox" class="lead-filter" value="candidate"> Kandidat org.nr</label>
              <label><input type="checkbox" class="lead-filter" value="website"> Nettside</label>
              <label><input type="checkbox" class="lead-filter" value="exact"> Riktig sted</label>
              <label><input type="checkbox" class="lead-filter" value="needsDeep"> Trenger sjekk</label>
              <label><input type="checkbox" class="lead-filter" value="brregIssue"> Brreg-varsel</label>
              <label><input type="checkbox" class="lead-filter" value="notContacted"> Ikke kontaktet</label>
              <label><input type="checkbox" class="lead-filter" value="contacted"> Kontaktet</label>
              <label><input type="checkbox" class="lead-filter" value="followUpDue"> Oppfølging</label>
              <label><input type="checkbox" class="lead-filter" value="interested"> Interessert</label>
              <label><input type="checkbox" class="lead-filter" value="strongEnough"> Skjul svake/usikre</label>
            </div>
            <button type="button" id="clearLeadFilters">Nullstill filter</button>
            <p id="leadFilterSummary" class="filter-summary">Ingen filter valgt.</p>
          </div>
        </details>
        <div id="leadCards"></div>
      </aside>
      <section class="lead-detail">
        <div id="leadDetail" class="empty-state">Kjør et søk for å se rangerte leads.</div>
      </section>
    </section>

    <section id="exportPanel" class="export-panel"></section>
  </main>

  <div id="callFocusOverlay" class="call-focus-mode" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
